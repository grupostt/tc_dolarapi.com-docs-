<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Juego de Gato - Ejecutable</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <h1>Gato (Tic-Tac-Toe)</h1>
    <div id="status">Jugador: <span id="player">X</span></div>
    <div id="board">
      <div class="cell" data-pos="0"></div>
      <div class="cell" data-pos="1"></div>
      <div class="cell" data-pos="2"></div>
      <div class="cell" data-pos="3"></div>
      <div class="cell" data-pos="4"></div>
      <div class="cell" data-pos="5"></div>
      <div class="cell" data-pos="6"></div>
      <div class="cell" data-pos="7"></div>
      <div class="cell" data-pos="8"></div>
    </div>
    <div class="controls">
      <button id="reset">Reiniciar</button>
      <button id="print" onclick="window.print()">Imprimir</button>
    </div>

    <script>
      const cells = document.querySelectorAll('.cell')
      let player = 'X'
      const board = Array(9).fill('')

      function checkWinner(b){
        const lines = [
          [0,1,2],[3,4,5],[6,7,8],
          [0,3,6],[1,4,7],[2,5,8],
          [0,4,8],[2,4,6]
        ]
        for(const [a,c,d] of lines){
          if(b[a] && b[a] === b[c] && b[a] === b[d]) return b[a]
        }
        return null
      }

      function updateStatus(){
        document.getElementById('player').textContent = player
      }

      function reset(){
        for(let i=0;i<9;i++){ board[i]=''; cells[i].textContent=''; }
        player='X'; updateStatus();
      }

      cells.forEach(cell => {
        cell.addEventListener('click', () => {
          const pos = parseInt(cell.dataset.pos)
          if(board[pos]) return
          board[pos]=player
          cell.textContent = player
          const winner = checkWinner(board)
          if(winner){
            alert('¡Gana ' + winner + '!')
          } else if(board.every(Boolean)){
            alert('Empate')
          } else {
            player = player === 'X' ? 'O' : 'X'
            updateStatus()
          }
        })
      })

      document.getElementById('reset').addEventListener('click', reset)
    </script>
  </body>
</html>
